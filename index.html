<style>
:root{
  --o:#F07020;--o2:#FF8C30;
  --bg:#2d2d2d;--bg2:#383838;--bg3:#424242;
  --card:rgba(255,255,255,.08);--border:rgba(240,112,32,.5);
  --t:#f0f0f0;--t2:#b0b0b0;--t3:#808080;--rain:#6ab4e0;
  --ok:#2ab84a;--warn:#f09020;--bad:#e03030;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--t);font-family:'Raleway',sans-serif;min-height:100vh}
.bg{position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 60% 40% at 85% 10%,rgba(240,112,32,.15) 0%,transparent 55%),
    radial-gradient(ellipse 50% 50% at 10% 90%,rgba(255,255,255,.05) 0%,transparent 55%),
    linear-gradient(160deg,#2d2d2d,#383838 50%,#2d2d2d)}
.app{position:relative;z-index:1;max-width:720px;margin:0 auto;padding:1.4rem 1rem 5rem}

/* Header */
.hdr{display:flex;align-items:center;gap:1rem;margin-bottom:1.6rem}
.logo{width:52px;height:52px;border-radius:13px;border:3px solid var(--o);
  overflow:hidden;flex-shrink:0;box-shadow:0 0 18px rgba(240,112,32,.35)}
.logo img{width:100%;height:100%;object-fit:contain}
.hdr h1{font-family:"Playfair Display",serif;font-size:1.875rem;color:var(--o);line-height:1}
.hdr p{font-size:0.812rem;color:var(--t2);letter-spacing:3px;text-transform:uppercase;margin-top:.2rem}

/* Search */
.srow{position:relative;margin-bottom:.6rem}
.sinp{width:100%;background:rgba(255,255,255,.1);border:2px solid rgba(240,112,32,.6);
  border-radius:13px;padding:.95rem 3.5rem .95rem 1.2rem;color:var(--t);font-size:1.25rem;
  font-family:'Raleway',sans-serif;outline:none;transition:.2s}
.sinp:focus{border-color:var(--o);box-shadow:0 0 0 4px rgba(240,112,32,.2)}
.sinp::placeholder{color:var(--t3)}
.sbtn{position:absolute;right:.5rem;top:50%;transform:translateY(-50%);
  background:var(--o);border:none;border-radius:9px;width:40px;height:40px;
  cursor:pointer;font-size:1.375rem;transition:.15s}
.sbtn:hover{background:var(--o2)}

/* Suggerimenti */
.sug{background:#383838;border:1px solid rgba(240,112,32,.5);
  border-radius:10px;margin-bottom:.8rem;overflow:hidden;display:none;
  box-shadow:0 4px 16px rgba(0,0,0,.15)}
.sug.open{display:block}
.si{padding:.75rem 1.1rem;cursor:pointer;font-size:1.125rem;
  border-bottom:1px solid rgba(255,255,255,.06);transition:.15s}
.si:last-child{border-bottom:none}
.si:hover{background:rgba(240,112,32,.15)}
.sn{color:var(--t);font-weight:600}
.sd{color:var(--t3);font-size:0.975rem;margin-top:.1rem}

/* Azioni */
.actions-bar{display:flex;gap:.5rem;margin-bottom:.8rem;flex-wrap:wrap}
.action-btn{flex:1;min-width:110px;display:flex;align-items:center;justify-content:center;
  gap:.4rem;background:rgba(255,255,255,.08);border:1px solid rgba(240,112,32,.45);
  border-radius:12px;padding:.65rem .7rem;color:var(--t);font-size:1.037rem;font-weight:600;
  cursor:pointer;transition:.2s;font-family:'Raleway',sans-serif}
.action-btn:hover{background:rgba(240,112,32,.2);border:2px solid var(--o)}

/* Pannelli collassabili */
.panel{display:none;background:rgba(255,255,255,.07);border:1px solid rgba(240,112,32,.35);
  border-radius:14px;padding:1rem;margin-bottom:.8rem;animation:su .25s ease}
.panel.open{display:block}
.ptitle{font-size:0.875rem;text-transform:uppercase;letter-spacing:2px;color:var(--t2);
  font-weight:700;margin-bottom:.7rem;display:flex;align-items:center;justify-content:space-between}
.ptitle button{background:none;border:none;color:var(--t3);font-size:0.9rem;cursor:pointer;
  font-family:'Raleway',sans-serif;text-transform:none;letter-spacing:0}
.chips{display:flex;gap:.4rem;flex-wrap:wrap}
.chip{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:20px;
  padding:.35rem .85rem;font-size:1.025rem;color:var(--t);cursor:pointer;transition:.15s;
  display:flex;align-items:center;gap:.35rem;white-space:nowrap}
.chip:hover{background:rgba(240,112,32,.2);border-color:var(--o)}
.chip-del{color:var(--t3);font-size:1.062rem}
.chip-del:hover{color:#c02020}
.no-items{font-size:1.025rem;color:var(--t3);font-style:italic}

/* Pulsante preferito */
.fav-wrap{margin-bottom:.8rem}
.fav-btn{display:inline-flex;align-items:center;gap:.4rem;
  background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.2);
  border-radius:10px;padding:.55rem 1rem;font-size:1.062rem;color:var(--t);
  cursor:pointer;transition:.2s;font-family:'Raleway',sans-serif;font-weight:600}
.fav-btn:hover{background:rgba(240,112,32,.15)}
.fav-btn.saved{background:rgba(240,112,32,.2);border:2px solid var(--o);color:var(--o2)}

/* Card */
.card{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);
  border-radius:17px;padding:1.3rem;margin-bottom:.8rem;
  animation:su .35s ease both;backdrop-filter:blur(4px)}
.card:nth-child(2){animation-delay:.05s}.card:nth-child(3){animation-delay:.1s}
.card:nth-child(4){animation-delay:.15s}.card:nth-child(5){animation-delay:.2s}
@keyframes su{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes sp{to{transform:rotate(360deg)}}

.clabel{font-size:0.85rem;text-transform:uppercase;letter-spacing:2.5px;color:var(--t2);
  margin-bottom:.85rem;font-weight:700;display:flex;align-items:center;gap:.5rem}
.tag{display:inline-block;border-radius:5px;padding:.1rem .45rem;font-size:0.725rem;
  font-weight:700;letter-spacing:.5px;vertical-align:middle}
.tag-ecmwf{background:rgba(0,80,180,.15);color:#0050b4;border:1px solid rgba(0,80,180,.2)}
.tag-icon{background:rgba(0,140,60,.15);color:#006020;border:1px solid rgba(0,140,60,.2)}
.tag-gfs{background:rgba(160,60,0,.15);color:#8a3000;border:1px solid rgba(160,60,0,.2)}
.tag-om{background:rgba(0,100,200,.12);color:#004080;border:1px solid rgba(0,100,200,.2)}

/* Hero */
.hero{display:flex;gap:1rem;align-items:flex-start;flex-wrap:wrap}
.hico{font-size:5.0rem;line-height:1;flex-shrink:0;filter:drop-shadow(0 3px 8px rgba(0,0,0,.2))}
.hloc{font-family:"Playfair Display",serif;font-size:1.875rem;color:var(--o);line-height:1.2}
.hreg{font-size:0.975rem;color:var(--t2);margin-bottom:.3rem}
.htemp{font-size:3.75rem;font-weight:800;line-height:1;letter-spacing:-2px;color:var(--t)}
.hfeel{font-size:1.025rem;color:var(--t2);margin-bottom:.2rem}
.hdesc{font-size:1.188rem;color:var(--t2);font-style:italic}

/* Griglia dettagli */
.dgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(115px,1fr));gap:.45rem;margin-top:.9rem}
.di{background:rgba(255,255,255,.08);border-radius:10px;padding:.65rem .8rem;
  border:1px solid rgba(255,255,255,.12)}
.dl{font-size:0.812rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--t2);margin-bottom:.2rem}
.dv{font-size:1.188rem;font-weight:700;color:var(--t)}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;vertical-align:middle;margin-right:4px}

/* Modelli */
.models-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:.5rem;margin-top:.5rem}
.model-card{background:rgba(255,255,255,.07);border-radius:11px;padding:.75rem;
  border:1px solid rgba(255,255,255,.12)}
.model-name{font-size:0.85rem;text-transform:uppercase;letter-spacing:1.5px;
  font-weight:700;margin-bottom:.4rem}
.model-temp{font-size:1.75rem;font-weight:800;color:var(--t)}
.model-desc{font-size:0.9rem;color:var(--t2);margin-top:.2rem}
.convergenza{margin-top:.8rem;padding:.7rem .9rem;border-radius:9px;
  font-size:1.1rem;line-height:1.5}
.conv-ok{background:rgba(0,140,60,.15);border:1px solid rgba(0,140,60,.3);color:#4ad870}
.conv-warn{background:rgba(200,120,0,.15);border:1px solid rgba(200,120,0,.3);color:#f0a040}

/* Orari */
.hscroll{overflow-x:auto;padding-bottom:.3rem}
.hscroll::-webkit-scrollbar{height:3px}
.hscroll::-webkit-scrollbar-thumb{background:rgba(240,112,32,.4);border-radius:2px}
.htable{display:flex;gap:.35rem;min-width:max-content}
.hcol{flex-shrink:0;width:76px;background:rgba(255,255,255,.07);border-radius:10px;
  padding:.6rem .35rem;text-align:center;border:1px solid rgba(255,255,255,.12)}
.hcol.now{background:rgba(240,112,32,.2);border:2.5px solid var(--o)}
.htime{font-size:1.1rem;font-weight:800;color:var(--o);margin-bottom:.28rem;letter-spacing:.5px}
.hico2{font-size:1.875rem;margin-bottom:.2rem}
.htemp2{font-size:1.1rem;font-weight:700;color:var(--t)}
.hwind{font-size:0.775rem;color:var(--t2);margin-top:.12rem;line-height:1.3}
.hrain{font-size:0.787rem;color:var(--rain);margin-top:.1rem;font-weight:600}
.hprob{font-size:0.75rem;color:var(--t3)}
.hfoot{font-size:0.85rem;color:var(--t3);margin-top:.5rem;line-height:1.5}

/* Forecast giorni */
.fcrow{display:flex;gap:.4rem;overflow-x:auto;padding-bottom:.3rem}
.fcrow::-webkit-scrollbar{height:3px}
.fcrow::-webkit-scrollbar-thumb{background:rgba(240,112,32,.4);border-radius:2px}
.fcd{flex-shrink:0;flex:1;min-width:88px;background:rgba(255,255,255,.07);border-radius:12px;
  padding:.75rem .45rem;text-align:center;border:1px solid rgba(255,255,255,.12);
  cursor:pointer;transition:.2s}
.fcd:hover,.fcd.act{background:rgba(240,112,32,.15);border:2px solid var(--o)}
.fcd.t0{background:rgba(240,112,32,.12);border:2px solid rgba(240,112,32,.5)}
.fcn{font-size:0.838rem;text-transform:uppercase;letter-spacing:1px;color:var(--t2);margin-bottom:.3rem}
.fci{font-size:2.125rem;margin-bottom:.2rem}
.fct{font-size:1.062rem;font-weight:700;color:var(--t)}
.fcp{font-size:0.812rem;color:var(--t2);margin-top:.2rem;line-height:1.3}

/* Consiglio */
.cons{background:rgba(0,100,40,.12);border:1px solid rgba(0,100,40,.3);
  border-radius:12px;padding:1rem 1.1rem;font-size:1.312rem;color:#7ae89a;line-height:1.7}

/* Loader / Error / Empty */
.ldiv{text-align:center;padding:3rem}
.spin{display:inline-block;width:40px;height:40px;border:3px solid rgba(240,112,32,.2);
  border-top-color:var(--o);border-radius:50%;animation:sp .9s linear infinite;margin-bottom:.8rem}
.ltxt{font-size:1.025rem;color:var(--t2);letter-spacing:1px}
.errbox{background:rgba(180,0,0,.1);border:1px solid rgba(180,0,0,.25);
  border-radius:12px;padding:1rem;color:#600;font-size:1.1rem;line-height:1.6}
.empty{text-align:center;padding:3rem 1rem;color:var(--t2);font-size:1.125rem;line-height:1.9}
.ebig{font-size:4.375rem;margin-bottom:.8rem}

/* Install banner */
.install-banner{display:none;position:fixed;bottom:1rem;left:1rem;right:1rem;
  background:#383838;border:1px solid var(--border);
  border-radius:13px;padding:.85rem 1rem;z-index:100;box-shadow:0 8px 32px rgba(0,0,0,.2);
  align-items:center;gap:.75rem}
.install-banner.visible{display:flex}
.install-banner p{flex:1;font-size:1.125rem;color:var(--t);line-height:1.4}
.ibtn{background:var(--o);border:none;border-radius:8px;padding:.45rem .85rem;
  color:#fff;font-size:1.025rem;font-family:'Raleway',sans-serif;font-weight:600;cursor:pointer}
.dbtn{background:none;border:none;color:var(--t3);font-size:1.375rem;cursor:pointer}

/* Radar integrato */
#radar-panel{display:none;background:rgba(255,255,255,.07);border:2px solid rgba(240,112,32,.5);
  border-radius:17px;overflow:hidden;margin-bottom:.8rem;animation:su .3s ease}
#radar-panel.open{display:block}
.radar-header{display:flex;align-items:center;justify-content:space-between;
  padding:.75rem 1rem;background:rgba(0,0,0,.25);flex-wrap:wrap;gap:.4rem}
.radar-title{font-size:.875rem;font-weight:700;color:var(--o2);letter-spacing:1px;text-transform:uppercase}
.radar-tabs{display:flex;gap:.35rem}
.radar-tab{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);
  border-radius:8px;padding:.3rem .7rem;font-size:.75rem;color:var(--t2);cursor:pointer;
  font-family:'Raleway',sans-serif;transition:.15s}
.radar-tab.active{background:rgba(240,112,32,.25);border-color:var(--o);color:var(--o2)}
.radar-close{background:none;border:none;color:var(--t2);font-size:1.1rem;cursor:pointer;padding:.2rem}
#radar-map-wrap{position:relative}
#radar-map{width:100%;height:420px}
#radar-controls{display:flex;align-items:center;gap:.5rem;padding:.65rem 1rem;
  background:rgba(0,0,0,.25);flex-wrap:wrap}
#radar-timeline{flex:1;min-width:0;display:flex;gap:3px;align-items:center;overflow:hidden}
.rt-frame{height:8px;flex:1;border-radius:3px;cursor:pointer;transition:.15s;opacity:.5}
.rt-frame.past{background:#6ab4e0}
.rt-frame.nowcast{background:#ff8c30}
.rt-frame.active{opacity:1;transform:scaleY(1.5)}
#radar-time{font-size:.78rem;color:var(--o2);font-weight:700;min-width:80px;text-align:center;font-family:sans-serif}
.radar-ctrl-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);
  border-radius:8px;padding:.35rem .65rem;color:var(--t);cursor:pointer;font-size:.9rem;
  transition:.15s;min-width:34px;text-align:center}
.radar-ctrl-btn:hover{background:rgba(240,112,32,.2);border-color:var(--o)}
.radar-ctrl-btn.playing{background:rgba(240,112,32,.2);border-color:var(--o)}
#radar-legend{display:flex;align-items:center;gap:.4rem;padding:.4rem 1rem;
  background:rgba(0,0,0,.15);font-size:.68rem;color:var(--t3);flex-wrap:wrap}
.rl-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
#radar-frame-dpc{width:100%;height:480px;border:none;display:block}

/* Sezioni riordinabili */
.sec-controls{display:flex;gap:.25rem;margin-left:auto;flex-shrink:0}
.sec-btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);
  border-radius:6px;width:26px;height:26px;cursor:pointer;color:var(--t2);
  font-size:.8rem;display:flex;align-items:center;justify-content:center;
  transition:.15s;flex-shrink:0}
.sec-btn:hover{background:rgba(240,112,32,.2);border-color:var(--o);color:var(--o2)}
.drag-hint{font-size:.65rem;color:var(--t3);text-align:center;margin-bottom:.5rem;opacity:.7}
</style>
</head>

      🇮🇹 Radar Protezione Civile · SRI (intensità pioggia al suolo) · Aggiornamento ogni 5 min · Solo dati osservati
    </div>

<script>
// ══════════════════════════════════════════════════════════════════════
//  WMO
// ══════════════════════════════════════════════════════════════════════
const WL={0:"Cielo sereno",1:"Quasi sereno",2:"Parzialmente nuvoloso",3:"Coperto",
  45:"Nebbia",48:"Nebbia con brina",51:"Pioggerella leggera",53:"Pioggerella",55:"Pioggerella intensa",
  61:"Pioggia leggera",63:"Pioggia",65:"Pioggia forte",
  71:"Neve leggera",73:"Neve",75:"Neve intensa",77:"Neve granulare",
  80:"Rovesci leggeri",81:"Rovesci",82:"Rovesci forti",
  85:"Nevicate",86:"Nevicate intense",95:"Temporale",96:"Temporale con grandine",99:"Temporale forte"};
const WI={0:"☀️",1:"🌤️",2:"⛅",3:"☁️",45:"🌫️",48:"🌫️",51:"🌦️",53:"🌦️",55:"🌧️",
  61:"🌧️",63:"🌧️",65:"🌧️",71:"🌨️",73:"❄️",75:"❄️",77:"🌨️",
  80:"🌧️",81:"🌧️",82:"⛈️",85:"🌨️",86:"❄️",95:"⛈️",96:"⛈️",99:"⛈️"};
const wl=c=>WL[c]||"Variabile", wi=c=>WI[c]||"🌤️";
function pCol(mm){if(!mm||mm<.2)return"#1a8a3a";if(mm<3)return"#d47000";if(mm<12)return"#c04000";return"#900000";}
function wDir(d){return["N","NE","E","SE","S","SO","O","NO"][Math.round((d||0)/45)%8]||"—";}
function fmtT(dt){if(!dt)return"--";const d=new Date(dt);return d.toLocaleTimeString("it-IT",{hour:"2-digit",minute:"2-digit"});}
function uvL(u){if(u<3)return"Basso";if(u<6)return"Moderato";if(u<8)return"Alto";if(u<11)return"Molto alto";return"Estremo";}
const DAYS=["Dom","Lun","Mar","Mer","Gio","Ven","Sab"];
const MONTHS=["gen","feb","mar","apr","mag","giu","lug","ago","set","ott","nov","dic"];
function fmtDay(s,i){if(i===0)return"Oggi";if(i===1)return"Domani";const d=new Date(s);return DAYS[d.getDay()]+" "+d.getDate()+" "+MONTHS[d.getMonth()];}
function escH(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function escJ(s){return String(s).replace(/\\/g,"\\\\").replace(/'/g,"\\'");}

// ══════════════════════════════════════════════════════════════════════
//  STORAGE: preferiti e recenti
// ══════════════════════════════════════════════════════════════════════
const S={
  gF(){try{return JSON.parse(localStorage.getItem("osm_fav")||"[]");}catch{return[];}},
  sF(v){localStorage.setItem("osm_fav",JSON.stringify(v));},
  gR(){try{return JSON.parse(localStorage.getItem("osm_rec")||"[]");}catch{return[];}},
  sR(v){localStorage.setItem("osm_rec",JSON.stringify(v));},
  addR(item){let r=this.gR().filter(x=>x.name!==item.name);r.unshift(item);this.sR(r.slice(0,10));},
  isF(name){return this.gF().some(x=>x.name===name);},
  togF(item){let f=this.gF();const i=f.findIndex(x=>x.name===item.name);if(i>=0)f.splice(i,1);else f.unshift(item);this.sF(f);}
};

let CUR=null; // luogo corrente

function togglePanel(id){
  const p=document.getElementById(id); if(!p)return;
  ["pnl-fav","pnl-rec"].forEach(x=>{if(x!==id){const el=document.getElementById(x);if(el)el.classList.remove("open");}});
  p.classList.toggle("open");
  if(id==="pnl-fav") p.innerHTML=renderFavPanel();
  if(id==="pnl-rec") p.innerHTML=renderRecPanel();
}
function renderFavPanel(){
  const f=S.gF();
  if(!f.length)return'<div class="ptitle">Preferiti</div><div class="no-items">Nessun preferito. Cerca e salva.</div>';
  return'<div class="ptitle">Preferiti</div><div class="chips">'+f.map(x=>`
    <div class="chip" onclick="quickFetch(${x.lat},${x.lon},'${escJ(x.name)}','${escJ(x.region)}')">
      ★ ${escH(x.name)}
      <span class="chip-del" onclick="event.stopPropagation();rmFav('${escJ(x.name)}')">✕</span>
    </div>`).join("")+"</div>";
}
function renderRecPanel(){
  const r=S.gR();
  if(!r.length)return'<div class="ptitle">Recenti</div><div class="no-items">Nessuna ricerca recente.</div>';
  return`<div class="ptitle">Recenti <button onclick="S.sR([]);document.getElementById('pnl-rec').innerHTML=renderRecPanel()" style="background:none;border:none;color:var(--t3);font-size:.72rem;cursor:pointer;font-family:'Raleway',sans-serif">Cancella</button></div>
    <div class="chips">`+r.map(x=>`
    <div class="chip" onclick="quickFetch(${x.lat},${x.lon},'${escJ(x.name)}','${escJ(x.region)}')">${escH(x.name)}</div>`).join("")+"</div>";
}
function rmFav(name){S.sF(S.gF().filter(x=>x.name!==name));document.getElementById("pnl-fav").innerHTML=renderFavPanel();updateFavBtn();}
function quickFetch(lat,lon,name,region){
  ["pnl-fav","pnl-rec"].forEach(x=>{const el=document.getElementById(x);if(el)el.classList.remove("open");});
  // Mostra la località nel campo di ricerca
  const inp=document.getElementById("inp");
  if(inp) inp.value=name+(region?", "+region:"");
  fetchWeather(lat,lon,name,region);
}
function updateFavBtn(){
  const b=document.getElementById("fav-btn"); if(!b||!CUR)return;
  const isFav=S.isF(CUR.name);
  b.textContent=isFav?"★ Preferito":"☆ Salva nei preferiti";
  b.className="fav-btn"+(isFav?" saved":"");
}
function toggleFav(){if(!CUR)return;S.togF(CUR);updateFavBtn();}
// ══════════════════════════════════════════════════════════════════════
//  RADAR — Leaflet + Rainviewer API + Protezione Civile
// ══════════════════════════════════════════════════════════════════════
let radarMap=null,radarLayers=[],radarFrames=[],radarIdx=0,radarPlaying=false,radarTimer=null,radarMode='rv';

function openRadar(){
  const panel=document.getElementById("radar-panel");
  if(panel.classList.contains("open")){closeRadar();return;}
  panel.classList.add("open");
  panel.scrollIntoView({behavior:"smooth",block:"start"});
  if(radarMode==='rv') initRainviewer();
  else initDPC();
}

function closeRadar(){
  document.getElementById("radar-panel").classList.remove("open");
  stopRadarPlay();
}

function switchRadar(mode){
  radarMode=mode;
  ["rv","dpc","3b"].forEach(m=>{
    const btn=document.getElementById("tab-"+m);
    if(btn) btn.classList.toggle("active",m===mode);
  });
  document.getElementById("radar-rv-wrap").style.display=mode==="rv"?"block":"none";
  document.getElementById("radar-dpc-wrap").style.display=mode==="dpc"?"block":"none";
  if(w3b) w3b.style.display=mode==="3b"?"block":"none";
  if(mode==="rv"){stopRadarPlay();initRainviewer();}
  else if(mode==="dpc") initDPC();
  else if(mode==="3b") init3bRadar();
}

async function initDPC(){
  if(!window.L){
    await loadScript("https://unpkg.com/leaflet@1.9.4/dist/leaflet.js");
    loadCSS("https://unpkg.com/leaflet@1.9.4/dist/leaflet.css");
    await new Promise(r=>setTimeout(r,300));
  }
  const lat=CUR?.lat||41.9,lon=CUR?.lon||12.5;
  if(!window.dpcMap){
    window.dpcMap=L.map("radar-map-dpc",{zoomControl:true,attributionControl:false,maxZoom:14}).setView([lat,lon],12);
    L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",{subdomains:"abcd",maxZoom:19}).addTo(window.dpcMap);
    window.dpcLayers=[];
    window.dpcFrames=[];
    window.dpcIdx=0;
    window.dpcPlaying=false;
    window.dpcTimer=null;
  } else {
    window.dpcMap.setView([lat,lon],12);
  }
  await loadDPCFrames();
}

async function loadDPCFrames(){
  // Usa direttamente WMS con ultimi 30 min (6 frame x 5min)
  loadDPCFramesFallback();
}

async function loadDPCFramesFallback(){
  // Fallback: costruisci URL WMS con timestamp degli ultimi 30 min
  const now = new Date();
  const frames = [];
  for(let i=5;i>=0;i--){
    const t = new Date(now - i*5*60*1000);
    // Arrotonda ai 5 minuti
    t.setSeconds(0,0);
    t.setMinutes(Math.floor(t.getMinutes()/5)*5);
    frames.push({
      time: t.getTime()/1000,
      wmsTime: t.toISOString().slice(0,16)+":00Z"
    });
  }
  window.dpcFrames = frames;
  renderDPCLayersWMS();
}

function renderDPCLayersWMS(){
  window.dpcLayers.forEach(l=>{try{window.dpcMap.removeLayer(l);}catch(e){}});
  window.dpcLayers=[];
  window.dpcFrames.forEach(f=>{
    const layer = L.tileLayer.wms("https://radar-geowebcache.protezionecivile.it/service/wms",{
      layers:"radar:sri",
      format:"image/png",
      transparent:true,
      version:"1.1.1",
      time: f.wmsTime,
      opacity:0,
      zIndex:10,
      width:512,
      height:512
    });
    window.dpcLayers.push(layer);
    layer.addTo(window.dpcMap);
  });
  renderDPCTimeline();
  window.dpcIdx=window.dpcFrames.length-1;
  showDPCFrame(window.dpcIdx);
}

function renderDPCLayers(){
  window.dpcLayers.forEach(l=>{try{window.dpcMap.removeLayer(l);}catch(e){}});
  window.dpcLayers=[];
  window.dpcFrames.forEach(f=>{
    const layer = L.imageOverlay(f.url,[[35,6],[48,20]],{opacity:0,zIndex:10});
    window.dpcLayers.push(layer);
    layer.addTo(window.dpcMap);
  });
  renderDPCTimeline();
  window.dpcIdx=window.dpcFrames.length-1;
  showDPCFrame(window.dpcIdx);
}

function renderDPCTimeline(){
  const tl=document.getElementById("dpc-timeline");
  if(!tl)return;
  tl.innerHTML=window.dpcFrames.map((f,i)=>
    `<div class="rt-frame past" onclick="showDPCFrame(${i})" title="${fmtRT(f.time)}" style="cursor:pointer"></div>`
  ).join("");
}

function showDPCFrame(i){
  if(!window.dpcFrames.length)return;
  if(window.dpcLayers[window.dpcIdx]) window.dpcLayers[window.dpcIdx].setOpacity(0);
  window.dpcIdx=Math.max(0,Math.min(i,window.dpcFrames.length-1));
  if(window.dpcLayers[window.dpcIdx]) window.dpcLayers[window.dpcIdx].setOpacity(0.75);
  const te=document.getElementById("dpc-time");
  if(te) te.textContent=fmtRT(window.dpcFrames[window.dpcIdx].time);
  document.querySelectorAll("#dpc-timeline .rt-frame").forEach((el,idx)=>el.classList.toggle("active",idx===window.dpcIdx));
}

function dpcPrev(){window.dpcPlaying=false;clearInterval(window.dpcTimer);const btn=document.getElementById("btn-dpc-play");if(btn){btn.textContent="▶";btn.classList.remove("playing");}showDPCFrame(window.dpcIdx-1);}
function dpcNext(){window.dpcPlaying=false;clearInterval(window.dpcTimer);const btn=document.getElementById("btn-dpc-play");if(btn){btn.textContent="▶";btn.classList.remove("playing");}showDPCFrame(window.dpcIdx+1);}
function dpcTogglePlay(){
  if(window.dpcPlaying){window.dpcPlaying=false;clearInterval(window.dpcTimer);const btn=document.getElementById("btn-dpc-play");if(btn){btn.textContent="▶";btn.classList.remove("playing");}return;}
  window.dpcPlaying=true;
  const btn=document.getElementById("btn-dpc-play");if(btn){btn.textContent="⏸";btn.classList.add("playing");}
  window.dpcTimer=setInterval(()=>{
    const next=(window.dpcIdx+1)%window.dpcFrames.length;
    showDPCFrame(next);
    if(next===window.dpcFrames.length-1){window.dpcPlaying=false;clearInterval(window.dpcTimer);const b=document.getElementById("btn-dpc-play");if(b){b.textContent="▶";b.classList.remove("playing");}}
  },800);
}

async function initRainviewer(){
  if(!window.L){
    await loadScript("https://unpkg.com/leaflet@1.9.4/dist/leaflet.js");
    loadCSS("https://unpkg.com/leaflet@1.9.4/dist/leaflet.css");
    await new Promise(r=>setTimeout(r,300));
  }
  const lat=CUR?.lat||41.9,lon=CUR?.lon||12.5;
  if(!radarMap){
    radarMap=L.map("radar-map",{zoomControl:true,attributionControl:false,maxZoom:14}).setView([lat,lon],12);
    L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",{subdomains:"abcd",maxZoom:19,maxNativeZoom:19}).addTo(radarMap);
  } else {
    // Ri-centra SEMPRE sulla località attuale
    radarMap.setView([lat,lon],12);
    radarMap.invalidateSize();
  }
  await loadRadarFrames();
}

async function loadRadarFrames(){
  try{
    const resp=await fetch("https://api.rainviewer.com/public/weather-maps.json");
    const data=await resp.json();
    const host=data.host;
    const now=Math.floor(Date.now()/1000);
    const past30=data.radar.past.filter(f=>f.time>=(now-30*60));
    const nowcast=(data.radar.nowcast||[]).slice(0,3);
    console.log("Rainviewer past30:", past30.length, "nowcast:", nowcast.length);
    radarFrames=[...past30.map(f=>({...f,type:"past",host})),...nowcast.map(f=>({...f,type:"nowcast",host}))];
    radarLayers.forEach(l=>{try{radarMap.removeLayer(l);}catch(e){}});
    radarLayers=[];
    radarFrames.forEach(f=>{
      const layer=L.tileLayer(f.host+f.path+"/512/{z}/{x}/{y}/4/1_1.png",{opacity:0,zIndex:10,maxNativeZoom:6,maxZoom:14,tileSize:512,zoomOffset:-1});
      radarLayers.push(layer);
      layer.addTo(radarMap);
    });
    renderTimeline();
    radarIdx=past30.length>0?past30.length-1:0;
    showRadarFrame(radarIdx);
  }catch(e){console.error("Radar:",e);}
}

function renderTimeline(){
  const tl=document.getElementById("radar-timeline");
  if(!tl)return;
  tl.innerHTML=radarFrames.map((f,i)=>
    `<div class="rt-frame ${f.type}" onclick="showRadarFrame(${i})" title="${fmtRT(f.time)}"></div>`
  ).join("");
}

function showRadarFrame(i){
  if(!radarFrames.length)return;
  if(radarLayers[radarIdx]) radarLayers[radarIdx].setOpacity(0);
  radarIdx=Math.max(0,Math.min(i,radarFrames.length-1));
  if(radarLayers[radarIdx]) radarLayers[radarIdx].setOpacity(0.7);
  const te=document.getElementById("radar-time");
  if(te) te.textContent=fmtRT(radarFrames[radarIdx].time);
  document.querySelectorAll(".rt-frame").forEach((el,idx)=>el.classList.toggle("active",idx===radarIdx));
}

function fmtRT(ts){
  const d=new Date(ts*1000);
  const diff=Math.round((ts-Date.now()/1000)/60);
  const t=d.toLocaleTimeString("it-IT",{hour:"2-digit",minute:"2-digit"});
  return diff>0?t+" (+"+diff+"')":(diff===0?t+" (ora)":t+" ("+diff+"')");
}

function radarPrev(){stopRadarPlay();showRadarFrame(radarIdx-1);}
function radarNext(){stopRadarPlay();showRadarFrame(radarIdx+1);}
function radarTogglePlay(){radarPlaying?stopRadarPlay():startRadarPlay();}

function startRadarPlay(){
  radarPlaying=true;
  const btn=document.getElementById("btn-play");
  if(btn){btn.textContent="⏸";btn.classList.add("playing");}
  radarTimer=setInterval(()=>{
    const next=(radarIdx+1)%radarFrames.length;
    showRadarFrame(next);
    if(next===radarFrames.length-1){stopRadarPlay();}
  },700);
}

function open3bRadar(){
  const name = CUR?.name || "";
  const lat = CUR?.lat || 41.9;
  const lon = CUR?.lon || 12.5;
  // 3bMeteo radar — cerca per nome località oppure apre radar Italia
  const slug = name.toLowerCase()
    .normalize("NFD").replace(/[̀-ͯ]/g,"")
    .replace(/\s+/g,"-").replace(/[^a-z0-9-]/g,"");
  // Tenta URL con nome città, fallback a radar Italia
  const url = slug
    ? `https://www.3bmeteo.com/meteo/${slug}/radar`
    : `https://www.3bmeteo.com/meteo/now`;
  window.open(url, "_blank");
}

function stopRadarPlay(){
  radarPlaying=false;
  clearInterval(radarTimer);
  const btn=document.getElementById("btn-play");
  if(btn){btn.textContent="▶";btn.classList.remove("playing");}
}

function loadScript(src){
  return new Promise((res,rej)=>{
    if(document.querySelector(`script[src="${src}"]`)){res();return;}
    const s=document.createElement("script");s.src=src;s.onload=res;s.onerror=rej;
    document.head.appendChild(s);
  });
}
function loadCSS(href){
  if(document.querySelector(`link[href="${href}"]`))return;
  const l=document.createElement("link");l.rel="stylesheet";l.href=href;
  document.head.appendChild(l);
}


// ══════════════════════════════════════════════════════════════════════
//  GEOCODING
// ══════════════════════════════════════════════════════════════════════
async function geocode(q){
  console.log("geocode() chiamato, q=",q);
  const results = [];
  const seen = new Set();
  const queries = [q];
  // Se la query contiene "monte"/"piana"/"lago"/"valle" prova anche senza
  // Se NON contiene "monte" ma sembra un monte, prova ad aggiungerlo
  const lq = q.toLowerCase();
  if(!lq.includes("monte ") && !lq.includes("colle ") && !lq.includes("lago ")){
    // prova anche con prefisso "Monte"
    queries.push("Monte " + q);
  }
  
  for(const query of queries){
    if(results.length >= 5) break;
    // 1. Open-Meteo — veloce, affidabile, buono per città
    try{
      const r=await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(query)}&count=5&language=it&format=json`);
      const d=await r.json();
      (d.results||[]).forEach(p=>{
        const key=`${p.latitude.toFixed(2)},${p.longitude.toFixed(2)}`;
        if(!seen.has(key)){
          seen.add(key);
          results.push({lat:p.latitude,lon:p.longitude,name:p.name,
            region:[p.admin2,p.admin1,p.country].filter(Boolean).join(", ")});
        }
      });
    }catch(e){}
    // 2. Nominatim — trova frazioni, monti, quartieri italiani
    if(results.length<3){
      try{
        const r2=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&limit=5&accept-language=it&addressdetails=1&namedetails=1&countrycodes=it`,
          {headers:{"User-Agent":"OServiceMeteo/1.0"}});
        const d2=await r2.json();
        d2.filter(x=>!["highway","road","path","footway","bus_stop"].includes(x.type)
             && !x.display_name?.toLowerCase().startsWith("via ")
             && !x.display_name?.toLowerCase().startsWith("strada "))
         .forEach(p=>{
          const key=`${parseFloat(p.lat).toFixed(2)},${parseFloat(p.lon).toFixed(2)}`;
          if(!seen.has(key)){
            seen.add(key);
            const addr=p.address||{};
            const name=p.namedetails?.name||addr.village||addr.hamlet||addr.town||addr.city||p.display_name.split(",")[0];
            const region=[addr.city||addr.town||addr.village,addr.county||addr.state_district,addr.state].filter(Boolean).join(", ");
            results.push({lat:parseFloat(p.lat),lon:parseFloat(p.lon),name,region});
          }
        });
      }catch(e){}
    }
  }

  // Fallback Nominatim — trova quartieri, frazioni, monti non in OM
  if(results.length < 3){
    try{
      const url=`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=6&accept-language=it&addressdetails=1&namedetails=1`;
      const r=await fetch(url,{headers:{"User-Agent":"OServiceMeteo/1.0"}});
      const d=await r.json();
      d.filter(x=>!["highway","road","path","footway","bus_stop"].includes(x.type)
               && !x.display_name?.toLowerCase().startsWith("via ")
               && !x.display_name?.toLowerCase().startsWith("strada "))
       .forEach(p=>{
         const key=`${parseFloat(p.lat).toFixed(2)},${parseFloat(p.lon).toFixed(2)}`;
         if(!seen.has(key)){
           seen.add(key);
           const addr=p.address||{};
           const name=p.namedetails?.name||addr.neighbourhood||addr.suburb||
                      addr.village||addr.town||addr.city||p.display_name.split(",")[0];
           const region=[addr.city||addr.town||addr.village,
                         addr.county||addr.state_district,addr.state].filter(Boolean).join(", ");
           results.push({lat:parseFloat(p.lat),lon:parseFloat(p.lon),name,region});
         }
       });
    }catch(e){}
  }
  return results;
}

async function go(){
  const inp=document.getElementById("inp");
  const v=inp?inp.value.trim():"";
  console.log("go() chiamato, v=",v);
  if(!v)return;
  // Chiudi radar se aperto
  const rp=document.getElementById("radar-panel");
  if(rp&&rp.classList.contains("open")) closeRadar();
  loader("Ricerca localit\u00e0...");
  const res=await geocode(v);
  if(!res.length){showErr(`Località "<b>${escH(v)}</b>" non trovata. Prova con un nome più preciso.`);return;}
  const p=res[0];
  fetchWeather(p.lat,p.lon,p.name,p.region);
}

//  FETCH METEO MULTI-MODELLO
// ══════════════════════════════════════════════════════════════════════
let wxData=null, selDay=0;

async function fetchWeather(lat,lon,name,region){
  loader("Caricamento previsioni multi-modello...");
  CUR={lat,lon,name,region};
  S.addR({lat,lon,name,region});
  selDay=0;
  try{
    // Fetch parallelo: modello best_match (composito OM) + ECMWF + ICON-D2 + GFS
    const base={latitude:lat,longitude:lon,timezone:"auto",wind_speed_unit:"kmh",forecast_days:7};
    
    const [rMain, rECMWF, rICON, rGFS] = await Promise.all([
      fetch("https://api.open-meteo.com/v1/forecast?"+new URLSearchParams({...base,
        current:["temperature_2m","relative_humidity_2m","apparent_temperature","precipitation",
                 "weather_code","wind_speed_10m","wind_direction_10m","wind_gusts_10m",
                 "visibility","uv_index","is_day"].join(","),
        hourly:["temperature_2m","weather_code","wind_speed_10m","wind_direction_10m",
                "precipitation","precipitation_probability","wind_gusts_10m"].join(","),
        daily:["weather_code","temperature_2m_max","temperature_2m_min","precipitation_sum",
               "precipitation_probability_max","wind_speed_10m_max","wind_gusts_10m_max",
               "uv_index_max","sunrise","sunset"].join(","),
        models:"best_match"})),
      fetch("https://api.open-meteo.com/v1/forecast?"+new URLSearchParams({...base,
        daily:["temperature_2m_max","temperature_2m_min","weather_code","precipitation_sum"].join(","),
        models:"ecmwf_ifs025"})),
      fetch("https://api.open-meteo.com/v1/forecast?"+new URLSearchParams({...base,
        daily:["temperature_2m_max","temperature_2m_min","weather_code","precipitation_sum"].join(","),
        models:"icon_seamless"})),
      fetch("https://api.open-meteo.com/v1/forecast?"+new URLSearchParams({...base,
        daily:["temperature_2m_max","temperature_2m_min","weather_code","precipitation_sum"].join(","),
        models:"gfs_seamless"}))
    ]);
    
    const [main, ecmwf, icon, gfs] = await Promise.all([rMain.json(),rECMWF.json(),rICON.json(),rGFS.json()]);
    wxData={main,ecmwf,icon,gfs,name,region,lat,lon};
    render();
    renderFavToggle();
  }catch(e){showErr("Errore connessione: "+e.message);}
}

function outdoorAdvice(){
  if(!wxData)return"";
  const cur=wxData.main.current, d=wxData.main.daily;
  const p=d.precipitation_sum[0]||0, pp=d.precipitation_probability_max[0]||0;
  const w=cur.wind_speed_10m||0, t=cur.temperature_2m||20, wmo=cur.weather_code;
  const pts=[];
  if(p>=15)pts.push("⛔ Piogge abbondanti — impermeabile e protezione attrezzature essenziali.");
  else if(p>=4)pts.push("🌧️ Precipitazioni moderate ("+p.toFixed(1)+"mm) — abbigliamento impermeabile consigliato.");
  else if(p>=.5)pts.push("🌦️ Possibile pioggerella ("+p.toFixed(1)+"mm) — tieni una giacca a vento.");
  else if(pp>50)pts.push("⚠️ Alta probabilità di precipitazioni ("+pp+"%) — preparati all'acqua.");
  else pts.push("✅ Tempo asciutto — buone condizioni per il lavoro all'aperto.");
  if([95,96,99].includes(wmo))pts.push("⚡ Temporali in corso: evitare creste, alberi isolati e zone esposte.");
  else if([80,81,82].includes(wmo))pts.push("🔄 Rovesci instabili: il tempo può cambiare rapidamente.");
  if(w>55)pts.push("💨 Vento molto forte ("+Math.round(w)+"km/h): attenzione a strutture e stabilità.");
  else if(w>35)pts.push("💨 Vento sostenuto ("+Math.round(w)+"km/h): prudenza in quota.");
  if(t<2)pts.push("🧊 Temperature vicino allo zero: rischio ghiaccio, indumenti termici necessari.");
  else if(t<8)pts.push("🧥 Mattine fredde: abbigliamento a strati consigliato.");
  else if(t>33)pts.push("☀️ Caldo intenso: idratarsi ogni 30min, limitare esposizione nelle ore centrali.");
  return pts.join("<br>");
}

function renderModels(dayIdx){
  if(!wxData)return'';
  const {ecmwf,icon,gfs}=wxData;
  const i=dayIdx;
  const tm={
    ecmwf:{max:Math.round(ecmwf.daily?.temperature_2m_max?.[i]),min:Math.round(ecmwf.daily?.temperature_2m_min?.[i]),wmo:ecmwf.daily?.weather_code?.[i],mm:parseFloat(ecmwf.daily?.precipitation_sum?.[i]||0).toFixed(1)},
    icon:{max:Math.round(icon.daily?.temperature_2m_max?.[i]),min:Math.round(icon.daily?.temperature_2m_min?.[i]),wmo:icon.daily?.weather_code?.[i],mm:parseFloat(icon.daily?.precipitation_sum?.[i]||0).toFixed(1)},
    gfs:{max:Math.round(gfs.daily?.temperature_2m_max?.[i]),min:Math.round(gfs.daily?.temperature_2m_min?.[i]),wmo:gfs.daily?.weather_code?.[i],mm:parseFloat(gfs.daily?.precipitation_sum?.[i]||0).toFixed(1)}
  };
  const maxs=[tm.ecmwf.max,tm.icon.max,tm.gfs.max].filter(x=>!isNaN(x)&&x!==undefined);
  const diff=maxs.length>1?Math.max(...maxs)-Math.min(...maxs):0;
  const dayLabel=fmtDay(wxData.main.daily.time[i],i);
  const convHtml=diff<=2
    ?'<div class="convergenza conv-ok">✅ I tre modelli concordano (±'+diff+'°C) — Alta affidabilità.</div>'
    :'<div class="convergenza conv-warn">⚠️ I modelli divergono di '+diff+'°C — Range possibile: '+Math.min(...maxs)+'–'+Math.max(...maxs)+'°C.</div>';
  return `<div class="clabel" style="display:flex;align-items:center"><span style="flex:1">Confronto modelli — ${dayLabel}</span><div class="sec-controls"><button class="sec-btn" onclick="moveSection('sec-models',-1)" title="Sposta su">↑</button><button class="sec-btn" onclick="moveSection('sec-models',1)" title="Sposta giù">↓</button></div></div>
    <div class="models-grid">
      <div class="model-card">
        <div class="model-name" style="color:#4090e0">ECMWF <span class="tag tag-ecmwf">Europeo</span></div>
        <div class="model-temp">${wi(tm.ecmwf.wmo)} ${tm.ecmwf.min}°/${tm.ecmwf.max}°C</div>
        <div class="model-desc">${wl(tm.ecmwf.wmo)} · ${tm.ecmwf.mm}mm</div>
      </div>
      <div class="model-card">
        <div class="model-name" style="color:#40b060">ICON-D2 <span class="tag tag-icon">Tedesco</span></div>
        <div class="model-temp">${wi(tm.icon.wmo)} ${tm.icon.min}°/${tm.icon.max}°C</div>
        <div class="model-desc">${wl(tm.icon.wmo)} · ${tm.icon.mm}mm</div>
      </div>
      <div class="model-card">
        <div class="model-name" style="color:#e07040">GFS <span class="tag tag-gfs">Americano</span></div>
        <div class="model-temp">${wi(tm.gfs.wmo)} ${tm.gfs.min}°/${tm.gfs.max}°C</div>
        <div class="model-desc">${wl(tm.gfs.wmo)} · ${tm.gfs.mm}mm</div>
      </div>
    </div>${convHtml}`;
}

function renderHourlyInner(){
  const lbl=''; // clabel già nel wrapper sec-hours
  if(!wxData)return lbl+'<div style="color:var(--t3);font-size:.85rem">Nessun dato.</div>';
  const h=wxData.main.hourly, d=wxData.main.daily;
  if(!d?.time||selDay>=d.time.length)return lbl+'<div style="color:var(--t3)">Nessun dato.</div>';
  const dayDate=d.time[selDay];
  const srH=d.sunrise[selDay]?parseInt(d.sunrise[selDay].substring(11,13)):6;
  const ssH=d.sunset[selDay]?parseInt(d.sunset[selDay].substring(11,13)):20;
  // Usa ora locale (non UTC) per evidenziare l'ora corrente
  const _n=new Date();
  const nowStr=`${_n.getFullYear()}-${String(_n.getMonth()+1).padStart(2,'0')}-${String(_n.getDate()).padStart(2,'0')}T${String(_n.getHours()).padStart(2,'0')}`;
  const hours=[];
  for(let i=0;i<h.time.length;i++){
    if(h.time[i].startsWith(dayDate))hours.push({
      t:h.time[i],hour:parseInt(h.time[i].substring(11,13)),
      temp:h.temperature_2m[i],wmo:h.weather_code[i],
      wind:h.wind_speed_10m[i],dir:h.wind_direction_10m[i],
      gusts:h.wind_gusts_10m[i],precip:h.precipitation[i],prob:h.precipitation_probability[i]
    });
  }
  if(!hours.length)return lbl+'<div style="color:var(--t3)">Nessun dato orario.</div>';
  const dayLabel=fmtDay(d.time[selDay],selDay);
  const cols=hours.map(h=>{
    const isNow=h.t.substring(0,13)===nowStr;
    return `<div class="hcol${isNow?" now":""}">
      <div class="htime">${String(h.hour).padStart(2,"0")}:00</div>
      <div class="hico2">${(h.hour<srH||h.hour>=ssH)&&h.wmo===0?"🌙":wi(h.wmo)}</div>
      <div class="htemp2">${Math.round(h.temp)}°</div>
      <div class="hwind">${wDir(h.dir)} ${Math.round(h.wind)}<br><span style="color:var(--t3)">↑${Math.round(h.gusts)}</span></div>
      ${h.precip>0?`<div class="hrain">${h.precip.toFixed(1)}mm</div>`:""}
      ${h.prob>0?`<div class="hprob">${h.prob}%</div>`:""}
    </div>`;
  }).join("");
  return lbl+`<div style="font-size:.72rem;color:var(--o);font-weight:700;margin-bottom:.6rem;text-transform:uppercase;letter-spacing:1.5px">${dayLabel}</div>
    <div class="hscroll"><div class="htable">${cols}</div></div>
    <div class="hfoot">🌅 ${fmtT(d.sunrise[selDay])} · 🌇 ${fmtT(d.sunset[selDay])} · vento km/h · ↑raffiche</div>`;
}

function changeDay(i){
  selDay=i;
  document.querySelectorAll(".fcd").forEach((el,idx)=>el.classList.toggle("act",idx===i));
  const hc=document.getElementById("sec-hours");
  if(hc){
    const inner=hc.querySelector(".hscroll")?.parentNode;
    // Aggiorna solo il contenuto interno mantenendo l'handle
    const tmp=document.createElement("div");
    tmp.innerHTML=renderHourlyInner();
    // Sostituisci tutto tranne il primo clabel
    const clabel=hc.querySelector(".clabel");
    while(hc.children.length>1) hc.removeChild(hc.lastChild);
    hc.insertAdjacentHTML("beforeend",renderHourlyInner().replace(/<div class="clabel">[^<]*(?:<[^>]*>[^<]*<\/[^>]*>)*[^<]*<\/div>/,""));
  }
  const mc=document.getElementById("models-inner");
  if(mc) mc.innerHTML=renderModels(i);
  if(hc) hc.scrollIntoView({behavior:"smooth",block:"nearest"});
}

      ${isFav?"★ Preferito":"☆ Salva nei preferiti"}
    </button>
  </div>`;
}

if("serviceWorker" in navigator){
  window.addEventListener("load",()=>{
  // ── Autocomplete inline ──────────────────────────────────────
  let _acT=null;
  const _ainp=document.getElementById("inp");
  const _asug=document.getElementById("sug");
  if(_ainp&&_asug){
    _ainp.addEventListener("input",()=>{
      clearTimeout(_acT);
      const v=_ainp.value.trim();
      if(v.length<2){_asug.classList.remove("open");return;}
      _acT=setTimeout(async()=>{
        try{
          const seen=new Set();
          const items=[];
          // 1. Open-Meteo — veloce e stabile
          try{
            const r=await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(v)}&count=5&language=it&format=json`);
            const d=await r.json();
            (d.results||[]).forEach(p=>{
              const key=`${p.latitude.toFixed(2)},${p.longitude.toFixed(2)}`;
              if(!seen.has(key)){
                seen.add(key);
                const det=[p.admin2,p.admin1,p.country].filter(Boolean).join(", ");
                items.push({lat:p.latitude,lon:p.longitude,name:p.name,det,priority:0});
              }
            });
          }catch(e){}
          // 2. Nominatim — frazioni, monti, quartieri italiani
          if(items.length<4){
            try{
              const r2=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(v)}&format=json&limit=5&accept-language=it&addressdetails=1&namedetails=1&countrycodes=it`,
                {headers:{"User-Agent":"OServiceMeteo/1.0"}});
              const d2=await r2.json();
              d2.filter(x=>!["highway","road","path","footway","bus_stop"].includes(x.type)
                   && !x.display_name?.toLowerCase().startsWith("via ")
                   && !x.display_name?.toLowerCase().startsWith("strada "))
               .forEach(p=>{
                const key=`${parseFloat(p.lat).toFixed(2)},${parseFloat(p.lon).toFixed(2)}`;
                if(!seen.has(key)){
                  seen.add(key);
                  const addr=p.address||{};
                  const name=p.namedetails?.name||addr.village||addr.hamlet||addr.town||addr.city||p.display_name.split(",")[0];
                  const det=[addr.city||addr.town||addr.village,addr.county,addr.state].filter(Boolean).join(", ");
                  const priority=(p.type==="peak"||p.type==="hill"||p.class==="natural")?-1:0;
                  items.push({lat:parseFloat(p.lat),lon:parseFloat(p.lon),name,det,priority});
                }
              });
            }catch(e){}
          }
          items.sort((a,b)=>(a.priority||0)-(b.priority||0));
          if(!items.length){_asug.classList.remove("open");return;}
          _asug.innerHTML=items.slice(0,6).map(p=>`<div class="si" onclick="selSug(${p.lat},${p.lon},'${escJ(p.name)}','${escJ(p.det)}')">`+
            `<div class="sn">${escH(p.name)}</div>`+
            (p.det?`<div class="sd">${escH(p.det)}</div>`:"")+
            `</div>`).join("");
          _asug.classList.add("open");
        }catch(e){_asug.classList.remove("open");}
      },400);
    });
    document.addEventListener("click",e=>{
      if(!e.target.closest(".srow")&&!e.target.closest(".sug")) _asug.classList.remove("open");
    });
  }
  // ── Fine autocomplete ─────────────────────────────────────────
    const sw=`const C="osm-v5";
self.addEventListener("install",e=>e.waitUntil(caches.open(C).then(c=>c.addAll(["/"]))));
self.addEventListener("activate",e=>e.waitUntil(caches.keys().then(k=>Promise.all(k.filter(x=>x!==C).map(x=>caches.delete(x))))));
self.addEventListener("fetch",e=>{
  if(e.request.url.includes("open-meteo.com")||e.request.url.includes("fonts.gstatic")){
    e.respondWith(fetch(e.request).catch(()=>caches.match(e.request)));return;
  }
  e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request)));
});`;
    const blob=new Blob([sw],{type:"application/javascript"});
    navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
  });
}

function moveSection(id, dir){
  const el = document.getElementById(id);
  if(!el) return;
  const parent = el.parentNode;
  const siblings = [...parent.querySelectorAll(".drag-card")];
  const idx = siblings.indexOf(el);
  if(dir === -1 && idx > 0){
    parent.insertBefore(el, siblings[idx-1]);
  } else if(dir === 1 && idx < siblings.length-1){
    parent.insertBefore(siblings[idx+1], el);
  }
  saveOrder();
}

function saveOrder(){
  const cards = [...document.querySelectorAll(".drag-card")];
  localStorage.setItem(SECTION_ORDER_KEY, JSON.stringify(cards.map(c=>c.id)));
}

function restoreOrder(){
  try{
    const saved = JSON.parse(localStorage.getItem(SECTION_ORDER_KEY)||"null");
    if(!saved) return;
    const container = document.getElementById("content");
    if(!container) return;
    saved.forEach(id=>{
      const el = document.getElementById(id);
      if(el) container.appendChild(el);
    });
  }catch(e){}
}

function initDragAndDrop(){
  const container = document.getElementById("content");
  if(!container) return;
  let dragSrc = null;

  container.addEventListener("dragstart", e=>{
    const card = e.target.closest(".drag-card");
    if(!card) return;
    dragSrc = card;
    card.classList.add("dragging");
    e.dataTransfer.effectAllowed = "move";
    e.dataTransfer.setData("text/plain", card.id);
  });
  container.addEventListener("dragend", e=>{
    document.querySelectorAll(".drag-card").forEach(c=>{
      c.classList.remove("dragging","drag-over");
    });
    saveOrder();
  });
  container.addEventListener("dragover", e=>{
    e.preventDefault();
    e.dataTransfer.dropEffect = "move";
    const card = e.target.closest(".drag-card");
    if(!card || card===dragSrc) return;
    document.querySelectorAll(".drag-card").forEach(c=>c.classList.remove("drag-over"));
    card.classList.add("drag-over");
  });
  container.addEventListener("dragleave", e=>{
    const card = e.target.closest(".drag-card");
    if(card) card.classList.remove("drag-over");
  });
  container.addEventListener("drop", e=>{
    e.preventDefault();
    const card = e.target.closest(".drag-card");
    if(!card || !dragSrc || card===dragSrc) return;
    card.classList.remove("drag-over");
    const cards = [...container.querySelectorAll(".drag-card")];
    const srcIdx = cards.indexOf(dragSrc);
    const dstIdx = cards.indexOf(card);
    if(srcIdx < dstIdx) card.after(dragSrc);
    else card.before(dragSrc);
    saveOrder();
  });
}

function saveOrder(){
  const cards = [...document.querySelectorAll(".drag-card")];
  const order = cards.map(c=>c.id);
  localStorage.setItem(SECTION_ORDER_KEY, JSON.stringify(order));
}

function restoreOrder(){
  try{
    const saved = JSON.parse(localStorage.getItem(SECTION_ORDER_KEY)||"null");
    if(!saved) return;
    const container = document.getElementById("content");
    if(!container) return;
    saved.forEach(id=>{
      const el = document.getElementById(id);
      if(el) container.appendChild(el);
    });
  }catch(e){}
}


// ── 3bMeteo Radar ─────────────────────────────────────────────────────────
function open3bDirect(){
  // Apre 3bMeteo radar in nuova scheda — non chiude il pannello radar
  const url="https://www.3bmeteo.com/radar/italia";
  window.open(url,"_blank");
}

function get3bUrl(){
  const name=CUR?.name||"";
  const slug=name.toLowerCase().replace(/[àáâãäå]/g,"a").replace(/[èéêë]/g,"e")
    .replace(/[ìíîï]/g,"i").replace(/[òóôõö]/g,"o").replace(/[ùúûü]/g,"u")
    .replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"");
  return "https://www.3bmeteo.com/radar/italia";
}

var _3bTimeout=null;
function init3bRadar(){
  var url=get3bUrl();
  var frame=document.getElementById("radar-frame-3b");
  var loading=document.getElementById("radar-3b-loading");
  var blocked=document.getElementById("radar-3b-blocked");
  var link=document.getElementById("link-3b");
  if(!frame) return;
  if(loading) loading.style.display="block";
  if(blocked) blocked.style.display="none";
  frame.style.display="none";
  if(link) link.href=url;
  clearTimeout(_3bTimeout);
  _3bTimeout=setTimeout(function(){
    if(loading) loading.style.display="none";
    frame.style.display="none";
    if(blocked) blocked.style.display="block";
  },4000);
  frame.src=url;
}

function on3bLoad(){
  clearTimeout(_3bTimeout);
  var frame=document.getElementById("radar-frame-3b");
  var loading=document.getElementById("radar-3b-loading");
  var blocked=document.getElementById("radar-3b-blocked");
  try{
    var doc=frame.contentDocument||frame.contentWindow.document;
    if(!doc||!doc.body||doc.body.innerHTML==="") throw new Error("blocked");
    if(loading) loading.style.display="none";
    frame.style.display="block";
  }catch(e){
    if(loading) loading.style.display="none";
    frame.style.display="none";
    if(blocked) blocked.style.display="block";
  }
}

function on3bError(){
  clearTimeout(_3bTimeout);
  var loading=document.getElementById("radar-3b-loading");
  var blocked=document.getElementById("radar-3b-blocked");
  if(loading) loading.style.display="none";
  if(blocked) blocked.style.display="block";
}

function selSug(lat,lon,name,region){
  var inp=document.getElementById("inp");
  var sug=document.getElementById("sug");
  if(inp) inp.value=name+(region?", "+region:"");
  if(sug) sug.classList.remove("open");
  fetchWeather(lat,lon,name,region);
}
