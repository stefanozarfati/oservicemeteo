<style>
:root{
  --o:#F07020;--o2:#FF8C30;
  --bg:#2d2d2d;--bg2:#383838;--bg3:#424242;
  --card:rgba(255,255,255,.08);--border:rgba(240,112,32,.5);
  --t:#f0f0f0;--t2:#b0b0b0;--t3:#808080;--rain:#6ab4e0;
  --ok:#2ab84a;--warn:#f09020;--bad:#e03030;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--t);font-family:'Raleway',sans-serif;min-height:100vh}
.bg{position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 60% 40% at 85% 10%,rgba(240,112,32,.15) 0%,transparent 55%),
    radial-gradient(ellipse 50% 50% at 10% 90%,rgba(255,255,255,.05) 0%,transparent 55%),
    linear-gradient(160deg,#2d2d2d,#383838 50%,#2d2d2d)}
.app{position:relative;z-index:1;max-width:720px;margin:0 auto;padding:1.4rem 1rem 5rem}

/* Header */
.hdr{display:flex;align-items:center;gap:1rem;margin-bottom:1.6rem}
.logo{width:52px;height:52px;border-radius:13px;border:3px solid var(--o);
  overflow:hidden;flex-shrink:0;box-shadow:0 0 18px rgba(240,112,32,.35)}
.logo img{width:100%;height:100%;object-fit:contain}
.hdr h1{font-family:"Playfair Display",serif;font-size:1.875rem;color:var(--o);line-height:1}
.hdr p{font-size:0.812rem;color:var(--t2);letter-spacing:3px;text-transform:uppercase;margin-top:.2rem}

/* Search */
.srow{position:relative;margin-bottom:.6rem}
.sinp{width:100%;background:rgba(255,255,255,.1);border:2px solid rgba(240,112,32,.6);
  border-radius:13px;padding:.95rem 3.5rem .95rem 1.2rem;color:var(--t);font-size:1.25rem;
  font-family:'Raleway',sans-serif;outline:none;transition:.2s}
.sinp:focus{border-color:var(--o);box-shadow:0 0 0 4px rgba(240,112,32,.2)}
.sinp::placeholder{color:var(--t3)}
.sbtn{position:absolute;right:.5rem;top:50%;transform:translateY(-50%);
  background:var(--o);border:none;border-radius:9px;width:40px;height:40px;
  cursor:pointer;font-size:1.375rem;transition:.15s}
.sbtn:hover{background:var(--o2)}

/* Suggerimenti */
.sug{background:#383838;border:1px solid rgba(240,112,32,.5);
  border-radius:10px;margin-bottom:.8rem;overflow:hidden;display:none;
  box-shadow:0 4px 16px rgba(0,0,0,.15)}
.sug.open{display:block}
.si{padding:.75rem 1.1rem;cursor:pointer;font-size:1.125rem;
  border-bottom:1px solid rgba(255,255,255,.06);transition:.15s}
.si:last-child{border-bottom:none}
.si:hover{background:rgba(240,112,32,.15)}
.sn{color:var(--t);font-weight:600}
.sd{color:var(--t3);font-size:0.975rem;margin-top:.1rem}

/* Azioni */
.actions-bar{display:flex;gap:.5rem;margin-bottom:.8rem;flex-wrap:wrap}
.action-btn{flex:1;min-width:110px;display:flex;align-items:center;justify-content:center;
  gap:.4rem;background:rgba(255,255,255,.08);border:1px solid rgba(240,112,32,.45);
  border-radius:12px;padding:.65rem .7rem;color:var(--t);font-size:1.037rem;font-weight:600;
  cursor:pointer;transition:.2s;font-family:'Raleway',sans-serif}
.action-btn:hover{background:rgba(240,112,32,.2);border:2px solid var(--o)}

/* Pannelli collassabili */
.panel{display:none;background:rgba(255,255,255,.07);border:1px solid rgba(240,112,32,.35);
  border-radius:14px;padding:1rem;margin-bottom:.8rem;animation:su .25s ease}
.panel.open{display:block}
.ptitle{font-size:0.875rem;text-transform:uppercase;letter-spacing:2px;color:var(--t2);
  font-weight:700;margin-bottom:.7rem;display:flex;align-items:center;justify-content:space-between}
.ptitle button{background:none;border:none;color:var(--t3);font-size:0.9rem;cursor:pointer;
  font-family:'Raleway',sans-serif;text-transform:none;letter-spacing:0}
.chips{display:flex;gap:.4rem;flex-wrap:wrap}
.chip{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:20px;
  padding:.35rem .85rem;font-size:1.025rem;color:var(--t);cursor:pointer;transition:.15s;
  display:flex;align-items:center;gap:.35rem;white-space:nowrap}
.chip:hover{background:rgba(240,112,32,.2);border-color:var(--o)}
.chip-del{color:var(--t3);font-size:1.062rem}
.chip-del:hover{color:#c02020}
.no-items{font-size:1.025rem;color:var(--t3);font-style:italic}

/* Pulsante preferito */
.fav-wrap{margin-bottom:.8rem}
.fav-btn{display:inline-flex;align-items:center;gap:.4rem;
  background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.2);
  border-radius:10px;padding:.55rem 1rem;font-size:1.062rem;color:var(--t);
  cursor:pointer;transition:.2s;font-family:'Raleway',sans-serif;font-weight:600}
.fav-btn:hover{background:rgba(240,112,32,.15)}
.fav-btn.saved{background:rgba(240,112,32,.2);border:2px solid var(--o);color:var(--o2)}

/* Card */
.card{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);
  border-radius:17px;padding:1.3rem;margin-bottom:.8rem;
  animation:su .35s ease both;backdrop-filter:blur(4px)}
.card:nth-child(2){animation-delay:.05s}.card:nth-child(3){animation-delay:.1s}
.card:nth-child(4){animation-delay:.15s}.card:nth-child(5){animation-delay:.2s}
@keyframes su{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes sp{to{transform:rotate(360deg)}}

.clabel{font-size:0.85rem;text-transform:uppercase;letter-spacing:2.5px;color:var(--t2);
  margin-bottom:.85rem;font-weight:700;display:flex;align-items:center;gap:.5rem}
.tag{display:inline-block;border-radius:5px;padding:.1rem .45rem;font-size:0.725rem;
  font-weight:700;letter-spacing:.5px;vertical-align:middle}
.tag-ecmwf{background:rgba(0,80,180,.15);color:#0050b4;border:1px solid rgba(0,80,180,.2)}
.tag-icon{background:rgba(0,140,60,.15);color:#006020;border:1px solid rgba(0,140,60,.2)}
.tag-gfs{background:rgba(160,60,0,.15);color:#8a3000;border:1px solid rgba(160,60,0,.2)}
.tag-om{background:rgba(0,100,200,.12);color:#004080;border:1px solid rgba(0,100,200,.2)}

/* Hero */
.hero{display:flex;gap:1rem;align-items:flex-start;flex-wrap:wrap}
.hico{font-size:5.0rem;line-height:1;flex-shrink:0;filter:drop-shadow(0 3px 8px rgba(0,0,0,.2))}
.hloc{font-family:"Playfair Display",serif;font-size:1.875rem;color:var(--o);line-height:1.2}
.hreg{font-size:0.975rem;color:var(--t2);margin-bottom:.3rem}
.htemp{font-size:3.75rem;font-weight:800;line-height:1;letter-spacing:-2px;color:var(--t)}
.hfeel{font-size:1.025rem;color:var(--t2);margin-bottom:.2rem}
.hdesc{font-size:1.188rem;color:var(--t2);font-style:italic}

/* Griglia dettagli */
.dgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(115px,1fr));gap:.45rem;margin-top:.9rem}
.di{background:rgba(255,255,255,.08);border-radius:10px;padding:.65rem .8rem;
  border:1px solid rgba(255,255,255,.12)}
.dl{font-size:0.812rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--t2);margin-bottom:.2rem}
.dv{font-size:1.188rem;font-weight:700;color:var(--t)}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;vertical-align:middle;margin-right:4px}

/* Modelli */
.models-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:.5rem;margin-top:.5rem}
.model-card{background:rgba(255,255,255,.07);border-radius:11px;padding:.75rem;
  border:1px solid rgba(255,255,255,.12)}
.model-name{font-size:0.85rem;text-transform:uppercase;letter-spacing:1.5px;
  font-weight:700;margin-bottom:.4rem}
.model-temp{font-size:1.75rem;font-weight:800;color:var(--t)}
.model-desc{font-size:0.9rem;color:var(--t2);margin-top:.2rem}
.convergenza{margin-top:.8rem;padding:.7rem .9rem;border-radius:9px;
  font-size:1.1rem;line-height:1.5}
.conv-ok{background:rgba(0,140,60,.15);border:1px solid rgba(0,140,60,.3);color:#4ad870}
.conv-warn{background:rgba(200,120,0,.15);border:1px solid rgba(200,120,0,.3);color:#f0a040}

/* Orari */
.hscroll{overflow-x:auto;padding-bottom:.3rem}
.hscroll::-webkit-scrollbar{height:3px}
.hscroll::-webkit-scrollbar-thumb{background:rgba(240,112,32,.4);border-radius:2px}
.htable{display:flex;gap:.35rem;min-width:max-content}
.hcol{flex-shrink:0;width:76px;background:rgba(255,255,255,.07);border-radius:10px;
  padding:.6rem .35rem;text-align:center;border:1px solid rgba(255,255,255,.12)}
.hcol.now{background:rgba(240,112,32,.2);border:2.5px solid var(--o)}
.htime{font-size:0.875rem;font-weight:700;color:var(--o);margin-bottom:.22rem}
.hico2{font-size:1.875rem;margin-bottom:.2rem}
.htemp2{font-size:1.1rem;font-weight:700;color:var(--t)}
.hwind{font-size:0.775rem;color:var(--t2);margin-top:.12rem;line-height:1.3}
.hrain{font-size:0.787rem;color:var(--rain);margin-top:.1rem;font-weight:600}
.hprob{font-size:0.75rem;color:var(--t3)}
.hfoot{font-size:0.85rem;color:var(--t3);margin-top:.5rem;line-height:1.5}

/* Forecast giorni */
.fcrow{display:flex;gap:.4rem;overflow-x:auto;padding-bottom:.3rem}
.fcrow::-webkit-scrollbar{height:3px}
.fcrow::-webkit-scrollbar-thumb{background:rgba(240,112,32,.4);border-radius:2px}
.fcd{flex-shrink:0;flex:1;min-width:88px;background:rgba(255,255,255,.07);border-radius:12px;
  padding:.75rem .45rem;text-align:center;border:1px solid rgba(255,255,255,.12);
  cursor:pointer;transition:.2s}
.fcd:hover,.fcd.act{background:rgba(240,112,32,.15);border:2px solid var(--o)}
.fcd.t0{background:rgba(240,112,32,.12);border:2px solid rgba(240,112,32,.5)}
.fcn{font-size:0.838rem;text-transform:uppercase;letter-spacing:1px;color:var(--t2);margin-bottom:.3rem}
.fci{font-size:2.125rem;margin-bottom:.2rem}
.fct{font-size:1.062rem;font-weight:700;color:var(--t)}
.fcp{font-size:0.812rem;color:var(--t2);margin-top:.2rem;line-height:1.3}

/* Consiglio */
.cons{background:rgba(0,100,40,.12);border:1px solid rgba(0,100,40,.3);
  border-radius:12px;padding:1rem 1.1rem;font-size:1.312rem;color:#7ae89a;line-height:1.7}

/* Loader / Error / Empty */
.ldiv{text-align:center;padding:3rem}
.spin{display:inline-block;width:40px;height:40px;border:3px solid rgba(240,112,32,.2);
  border-top-color:var(--o);border-radius:50%;animation:sp .9s linear infinite;margin-bottom:.8rem}
.ltxt{font-size:1.025rem;color:var(--t2);letter-spacing:1px}
.errbox{background:rgba(180,0,0,.1);border:1px solid rgba(180,0,0,.25);
  border-radius:12px;padding:1rem;color:#600;font-size:1.1rem;line-height:1.6}
.empty{text-align:center;padding:3rem 1rem;color:var(--t2);font-size:1.125rem;line-height:1.9}
.ebig{font-size:4.375rem;margin-bottom:.8rem}

/* Install banner */
.install-banner{display:none;position:fixed;bottom:1rem;left:1rem;right:1rem;
  background:#383838;border:1px solid var(--border);
  border-radius:13px;padding:.85rem 1rem;z-index:100;box-shadow:0 8px 32px rgba(0,0,0,.2);
  align-items:center;gap:.75rem}
.install-banner.visible{display:flex}
.install-banner p{flex:1;font-size:1.125rem;color:var(--t);line-height:1.4}
.ibtn{background:var(--o);border:none;border-radius:8px;padding:.45rem .85rem;
  color:#fff;font-size:1.025rem;font-family:'Raleway',sans-serif;font-weight:600;cursor:pointer}
.dbtn{background:none;border:none;color:var(--t3);font-size:1.375rem;cursor:pointer}

/* Radar integrato */
#radar-panel{display:none;background:rgba(255,255,255,.07);border:2px solid rgba(240,112,32,.5);
  border-radius:17px;overflow:hidden;margin-bottom:.8rem;animation:su .3s ease}
#radar-panel.open{display:block}
#radar-frame{width:100%;height:480px;border:none;display:block}
.radar-header{display:flex;align-items:center;justify-content:space-between;
  padding:.8rem 1rem;background:rgba(0,0,0,.2)}
.radar-title{font-size:.88rem;font-weight:700;color:var(--o2);letter-spacing:1px;text-transform:uppercase}
.radar-close{background:none;border:none;color:var(--t2);font-size:1.2rem;cursor:pointer;padding:.2rem}
</style>

function pCol(mm){if(!mm||mm<.2)return"#1a8a3a";if(mm<3)return"#d47000";if(mm<12)return"#c04000";return"#900000";}
function wDir(d){return["N","NE","E","SE","S","SO","O","NO"][Math.round((d||0)/45)%8]||"—";}
function fmtT(dt){if(!dt)return"--";const d=new Date(dt);return d.toLocaleTimeString("it-IT",{hour:"2-digit",minute:"2-digit"});}
function uvL(u){if(u<3)return"Basso";if(u<6)return"Moderato";if(u<8)return"Alto";if(u<11)return"Molto alto";return"Estremo";}
const DAYS=["Dom","Lun","Mar","Mer","Gio","Ven","Sab"];
const MONTHS=["gen","feb","mar","apr","mag","giu","lug","ago","set","ott","nov","dic"];
function fmtDay(s,i){if(i===0)return"Oggi";if(i===1)return"Domani";const d=new Date(s);return DAYS[d.getDay()]+" "+d.getDate()+" "+MONTHS[d.getMonth()];}
function escH(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function escJ(s){return String(s).replace(/\\/g,"\\\\").replace(/'/g,"\\'");}

// ══════════════════════════════════════════════════════════════════════
//  STORAGE: preferiti e recenti
// ══════════════════════════════════════════════════════════════════════
const S={
  gF(){try{return JSON.parse(localStorage.getItem("osm_fav")||"[]");}catch{return[];}},
  sF(v){localStorage.setItem("osm_fav",JSON.stringify(v));},
  gR(){try{return JSON.parse(localStorage.getItem("osm_rec")||"[]");}catch{return[];}},
  sR(v){localStorage.setItem("osm_rec",JSON.stringify(v));},
  addR(item){let r=this.gR().filter(x=>x.name!==item.name);r.unshift(item);this.sR(r.slice(0,10));},
  isF(name){return this.gF().some(x=>x.name===name);},
  togF(item){let f=this.gF();const i=f.findIndex(x=>x.name===item.name);if(i>=0)f.splice(i,1);else f.unshift(item);this.sF(f);}
};

let CUR=null; // luogo corrente

function togglePanel(id){
  const p=document.getElementById(id); if(!p)return;
  ["pnl-fav","pnl-rec"].forEach(x=>{if(x!==id){const el=document.getElementById(x);if(el)el.classList.remove("open");}});
  p.classList.toggle("open");
  if(id==="pnl-fav") p.innerHTML=renderFavPanel();
  if(id==="pnl-rec") p.innerHTML=renderRecPanel();
}
function renderFavPanel(){
  const f=S.gF();
  if(!f.length)return'<div class="ptitle">Preferiti</div><div class="no-items">Nessun preferito. Cerca e salva.</div>';
  return'<div class="ptitle">Preferiti</div><div class="chips">'+f.map(x=>`
    <div class="chip" onclick="quickFetch(${x.lat},${x.lon},'${escJ(x.name)}','${escJ(x.region)}')">
      ★ ${escH(x.name)}
      <span class="chip-del" onclick="event.stopPropagation();rmFav('${escJ(x.name)}')">✕</span>
    </div>`).join("")+"</div>";
}
function renderRecPanel(){
  const r=S.gR();
  if(!r.length)return'<div class="ptitle">Recenti</div><div class="no-items">Nessuna ricerca recente.</div>';
  return`<div class="ptitle">Recenti <button onclick="S.sR([]);document.getElementById('pnl-rec').innerHTML=renderRecPanel()" style="background:none;border:none;color:var(--t3);font-size:.72rem;cursor:pointer;font-family:'Raleway',sans-serif">Cancella</button></div>
    <div class="chips">`+r.map(x=>`
    <div class="chip" onclick="quickFetch(${x.lat},${x.lon},'${escJ(x.name)}','${escJ(x.region)}')">${escH(x.name)}</div>`).join("")+"</div>";
}
function rmFav(name){S.sF(S.gF().filter(x=>x.name!==name));document.getElementById("pnl-fav").innerHTML=renderFavPanel();updateFavBtn();}
function quickFetch(lat,lon,name,region){
  ["pnl-fav","pnl-rec"].forEach(x=>{const el=document.getElementById(x);if(el)el.classList.remove("open");});
  fetchWeather(lat,lon,name,region);
}
function updateFavBtn(){
  const b=document.getElementById("fav-btn"); if(!b||!CUR)return;
  const isFav=S.isF(CUR.name);
  b.textContent=isFav?"★ Preferito":"☆ Salva nei preferiti";
  b.className="fav-btn"+(isFav?" saved":"");
}
function toggleFav(){if(!CUR)return;S.togF(CUR);updateFavBtn();}
function openRadar(){
  const lat=CUR?.lat||41.9, lon=CUR?.lon||12.5;
  const panel=document.getElementById("radar-panel");
  const frame=document.getElementById("radar-frame");
  if(panel.classList.contains("open")){
    closeRadar(); return;
  }
  frame.src=`https://www.rainviewer.com/map.html?loc=${lat},${lon},10&oFa=0&oC=0&oU=0&oCS=1&oF=0&oAP=1&rmt=4&c=3&o=83&lm=0&layer=radar&sm=1&sn=1`;
  panel.classList.add("open");
  panel.scrollIntoView({behavior:"smooth",block:"start"});
}
function closeRadar(){
  const panel=document.getElementById("radar-panel");
  const frame=document.getElementById("radar-frame");
  panel.classList.remove("open");
  // Reset iframe per fermare caricamento
  setTimeout(()=>{if(!panel.classList.contains("open")) frame.src="";},300);
}

async function geocode(q){
  console.log("geocode called:", q);
  try{
    const r=await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=6&language=it&format=json`);
    const d=await r.json();
    if(d.results?.length) return d.results.map(p=>({lat:p.latitude,lon:p.longitude,name:p.name,region:[p.admin2,p.admin1,p.country].filter(Boolean).join(", ")}));
  }catch(e){}
  return [];
}

let _acT=null;
const _inp=document.getElementById("inp");
const _sug=document.getElementById("sug");
_inp.addEventListener("input",()=>{

    _sug.innerHTML=res.map(p=>`<div class="si" onclick="selSug(${p.lat},${p.lon},'${escJ(p.name)}','${escJ(p.region)}')">
      <div class="sn">${escH(p.name)}</div>
      ${p.region?`<div class="sd">${escH(p.region)}</div>`:""}
    </div>`).join("");
    _sug.classList.add("open");
  },300);
});
document.addEventListener("click",e=>{if(!e.target.closest(".srow")&&!e.target.closest(".sug"))_sug.classList.remove("open");});
function selSug(lat,lon,name,region){_inp.value=name+(region?", "+region:"");_sug.classList.remove("open");fetchWeather(lat,lon,name,region);}

document.getElementById("sbtn").addEventListener("click",go);

async function go(){
  const v=_inp.value.trim(); if(!v)return;
  loader("Ricerca localit\u00e0...");
  // Test connessione geocoding
  try{
    const test=await fetch("https://geocoding-api.open-meteo.com/v1/search?name=Roma&count=1&format=json");
    if(!test.ok) throw new Error("HTTP "+test.status);
  }catch(e){
    showErr("Errore connessione geocoding: "+e.message+"<br><small>Prova ad aprire il file tramite un server locale o da GitHub Pages.</small>");
    return;
  }
  const res=await geocode(v);
  if(!res.length){showErr(`Località "<b>${escH(v)}</b>" non trovata. Prova con un nome più preciso.`);return;}
  const p=res[0];
  fetchWeather(p.lat,p.lon,p.name,p.region);
}

//  FETCH METEO MULTI-MODELLO
// ══════════════════════════════════════════════════════════════════════
let wxData=null, selDay=0;

async function fetchWeather(lat,lon,name,region){
  loader("Caricamento previsioni multi-modello...");
  CUR={lat,lon,name,region};
  S.addR({lat,lon,name,region});
  selDay=0;
  try{
    // Fetch parallelo: modello best_match (composito OM) + ECMWF + ICON-D2 + GFS
    const base={latitude:lat,longitude:lon,timezone:"auto",wind_speed_unit:"kmh",forecast_days:7};
    
    const [rMain, rECMWF, rICON, rGFS] = await Promise.all([
      fetch("https://api.open-meteo.com/v1/forecast?"+new URLSearchParams({...base,
        current:["temperature_2m","relative_humidity_2m","apparent_temperature","precipitation",
                 "weather_code","wind_speed_10m","wind_direction_10m","wind_gusts_10m",
                 "visibility","uv_index","is_day"].join(","),
        hourly:["temperature_2m","weather_code","wind_speed_10m","wind_direction_10m",
                "precipitation","precipitation_probability","wind_gusts_10m"].join(","),
        daily:["weather_code","temperature_2m_max","temperature_2m_min","precipitation_sum",
               "precipitation_probability_max","wind_speed_10m_max","wind_gusts_10m_max",
               "uv_index_max","sunrise","sunset"].join(","),
        models:"best_match"})),
      fetch("https://api.open-meteo.com/v1/forecast?"+new URLSearchParams({...base,
        daily:["temperature_2m_max","temperature_2m_min","weather_code","precipitation_sum"].join(","),
        models:"ecmwf_ifs025"})),
      fetch("https://api.open-meteo.com/v1/forecast?"+new URLSearchParams({...base,
        daily:["temperature_2m_max","temperature_2m_min","weather_code","precipitation_sum"].join(","),
        models:"icon_seamless"})),
      fetch("https://api.open-meteo.com/v1/forecast?"+new URLSearchParams({...base,
        daily:["temperature_2m_max","temperature_2m_min","weather_code","precipitation_sum"].join(","),
        models:"gfs_seamless"}))
    ]);
    
    const [main, ecmwf, icon, gfs] = await Promise.all([rMain.json(),rECMWF.json(),rICON.json(),rGFS.json()]);
    wxData={main,ecmwf,icon,gfs,name,region,lat,lon};
    render();
    renderFavToggle();
  }catch(e){showErr("Errore connessione: "+e.message);}
}

function outdoorAdvice(){
  if(!wxData)return"";
  const cur=wxData.main.current, d=wxData.main.daily;
  const p=d.precipitation_sum[0]||0, pp=d.precipitation_probability_max[0]||0;
  const w=cur.wind_speed_10m||0, t=cur.temperature_2m||20, wmo=cur.weather_code;
  const pts=[];
  if(p>=15)pts.push("⛔ Piogge abbondanti — impermeabile e protezione attrezzature essenziali.");
  else if(p>=4)pts.push("🌧️ Precipitazioni moderate ("+p.toFixed(1)+"mm) — abbigliamento impermeabile consigliato.");
  else if(p>=.5)pts.push("🌦️ Possibile pioggerella ("+p.toFixed(1)+"mm) — tieni una giacca a vento.");
  else if(pp>50)pts.push("⚠️ Alta probabilità di precipitazioni ("+pp+"%) — preparati all'acqua.");
  else pts.push("✅ Tempo asciutto — buone condizioni per il lavoro all'aperto.");
  if([95,96,99].includes(wmo))pts.push("⚡ Temporali in corso: evitare creste, alberi isolati e zone esposte.");
  else if([80,81,82].includes(wmo))pts.push("🔄 Rovesci instabili: il tempo può cambiare rapidamente.");
  if(w>55)pts.push("💨 Vento molto forte ("+Math.round(w)+"km/h): attenzione a strutture e stabilità.");
  else if(w>35)pts.push("💨 Vento sostenuto ("+Math.round(w)+"km/h): prudenza in quota.");
  if(t<2)pts.push("🧊 Temperature vicino allo zero: rischio ghiaccio, indumenti termici necessari.");
  else if(t<8)pts.push("🧥 Mattine fredde: abbigliamento a strati consigliato.");
  else if(t>33)pts.push("☀️ Caldo intenso: idratarsi ogni 30min, limitare esposizione nelle ore centrali.");
  return pts.join("<br>");
}

function render(){
  if(!wxData)return;
  const {main,ecmwf,icon,gfs,name,region}=wxData;
  const cur=main.current, d=main.daily;

  // Confronto modelli giorno 0
  const tm={
    ecmwf:{max:Math.round(ecmwf.daily?.temperature_2m_max?.[0]),min:Math.round(ecmwf.daily?.temperature_2m_min?.[0]),wmo:ecmwf.daily?.weather_code?.[0],mm:ecmwf.daily?.precipitation_sum?.[0]?.toFixed(1)||"0"},
    icon:{max:Math.round(icon.daily?.temperature_2m_max?.[0]),min:Math.round(icon.daily?.temperature_2m_min?.[0]),wmo:icon.daily?.weather_code?.[0],mm:icon.daily?.precipitation_sum?.[0]?.toFixed(1)||"0"},
    gfs:{max:Math.round(gfs.daily?.temperature_2m_max?.[0]),min:Math.round(gfs.daily?.temperature_2m_min?.[0]),wmo:gfs.daily?.weather_code?.[0],mm:gfs.daily?.precipitation_sum?.[0]?.toFixed(1)||"0"}
  };
  
  // Calcola convergenza
  const maxs=[tm.ecmwf.max,tm.icon.max,tm.gfs.max].filter(x=>!isNaN(x));
  const diff=maxs.length>1?Math.max(...maxs)-Math.min(...maxs):0;
  const convHtml=diff<=2
    ? '<div class="convergenza conv-ok">✅ I tre modelli concordano (differenza max ±'+diff+'°C). Alta affidabilità della previsione.</div>'
    : '<div class="convergenza conv-warn">⚠️ I modelli divergono di '+diff+'°C. Previsione incerta — considera il range '+Math.min(...maxs)+'–'+Math.max(...maxs)+'°C come possibile.</div>';

  // Forecast strip 7gg
  let fcHtml="";
  for(let i=0;i<Math.min(7,d.time.length);i++){
    const mm=d.precipitation_sum[i];
    fcHtml+=`<div class="fcd${i===0?" t0":""}${i===selDay?" act":""}" onclick="changeDay(${i})">
      <div class="fcn">${fmtDay(d.time[i],i)}</div>
      <div class="fci">${wi(d.weather_code[i])}</div>
      <div class="fct">${Math.round(d.temperature_2m_min[i])}°/${Math.round(d.temperature_2m_max[i])}°</div>
      <div class="fcp"><span class="dot" style="background:${pCol(mm)}"></span>${mm>0?parseFloat(mm).toFixed(1)+"mm":"Asciutto"}${d.precipitation_probability_max[i]>0?" ("+d.precipitation_probability_max[i]+"%)" :""}</div>
    </div>`;
  }

  document.getElementById("content").innerHTML=`
    <!-- ORE -->
    <div class="card" id="hcard">${renderHourly()}</div>

    <!-- 7 GIORNI -->
    <div class="card">
      <div class="clabel">Previsioni 7 giorni · Tocca per le ore</div>
      <div class="fcrow">${fcHtml}</div>
    </div>
    
    <!-- CONDIZIONI ATTUALI -->
    <div class="card">
      <div class="clabel">Condizioni attuali <span class="tag tag-om">OPEN-METEO LIVE</span></div>
      <div class="hero">
        <div class="hico">${wi(cur.weather_code)}</div>
        <div style="flex:1;min-width:150px">
          <div class="hloc">${escH(name)}</div>
          <div class="hreg">${escH(region)}</div>
          <div class="htemp">${Math.round(cur.temperature_2m)}°<span style="font-size:1.3rem;color:var(--t2);font-weight:300">C</span></div>
          <div class="hfeel">Percepita ${Math.round(cur.apparent_temperature)}°C</div>
          <div class="hdesc">${wl(cur.weather_code)}</div>
        </div>
      </div>
      <div class="dgrid">
        <div class="di"><div class="dl">🌡️ Min/Max</div><div class="dv">${Math.round(d.temperature_2m_min[0])}°/${Math.round(d.temperature_2m_max[0])}°C</div></div>
        <div class="di"><div class="dl">💧 Umidità</div><div class="dv">${cur.relative_humidity_2m}%</div></div>
        <div class="di"><div class="dl">💨 Vento</div><div class="dv">${wDir(cur.wind_direction_10m)} ${Math.round(cur.wind_speed_10m)} km/h</div></div>
        <div class="di"><div class="dl">💨 Raffiche</div><div class="dv">${Math.round(cur.wind_gusts_10m)} km/h</div></div>
        <div class="di"><div class="dl">🌧️ Precip.</div>
          <div class="dv"><span class="dot" style="background:${pCol(d.precipitation_sum[0])}"></span>${d.precipitation_sum[0]>0?parseFloat(d.precipitation_sum[0]).toFixed(1)+"mm":"Assenti"}</div></div>
        <div class="di"><div class="dl">☀️ UV max</div><div class="dv">${d.uv_index_max[0]} — ${uvL(d.uv_index_max[0])}</div></div>
        <div class="di"><div class="dl">👁️ Visibilità</div><div class="dv">${cur.visibility!=null?(cur.visibility/1000).toFixed(0)+"km":"—"}</div></div>
        <div class="di"><div class="dl">🌅 Alba/Tramonto</div><div class="dv">${fmtT(d.sunrise[0])}/${fmtT(d.sunset[0])}</div></div>
      </div>
    </div>

    <!-- CONFRONTO MODELLI -->
    <div class="card">
      <div class="clabel">Confronto modelli — Oggi</div>
      <div class="models-grid">
        <div class="model-card">
          <div class="model-name" style="color:#0050b4">ECMWF <span class="tag tag-ecmwf">Europeo</span></div>
          <div class="model-temp">${wi(tm.ecmwf.wmo)} ${tm.ecmwf.min}°/${tm.ecmwf.max}°C</div>

        </div>
        <div class="model-card">
          <div class="model-name" style="color:#006020">ICON-D2 <span class="tag tag-icon">Tedesco</span></div>

      Dati: Open-Meteo · ECMWF · ICON-D2 · GFS · Aggiornamento orario
    </div>`;
}

function renderHourly(){
  const lbl='<div class="clabel">🕐 Ore per ora <span class="tag tag-om">OPEN-METEO</span></div>';
  if(!wxData)return lbl+'<div style="color:var(--t3);font-size:.85rem">Nessun dato.</div>';
  const h=wxData.main.hourly, d=wxData.main.daily;
  if(!d?.time||selDay>=d.time.length)return lbl+'<div style="color:var(--t3)">Nessun dato.</div>';
  const dayDate=d.time[selDay];
  const srH=d.sunrise[selDay]?parseInt(d.sunrise[selDay].substring(11,13)):6;
  const ssH=d.sunset[selDay]?parseInt(d.sunset[selDay].substring(11,13)):20;
  const nowStr=new Date().toISOString().substring(0,13);
  const hours=[];
  for(let i=0;i<h.time.length;i++){
    if(h.time[i].startsWith(dayDate))hours.push({
      t:h.time[i],hour:parseInt(h.time[i].substring(11,13)),
      temp:h.temperature_2m[i],wmo:h.weather_code[i],
      wind:h.wind_speed_10m[i],dir:h.wind_direction_10m[i],
      gusts:h.wind_gusts_10m[i],precip:h.precipitation[i],prob:h.precipitation_probability[i]
    });
  }
  if(!hours.length)return lbl+'<div style="color:var(--t3)">Nessun dato orario.</div>';
  const dayLabel=fmtDay(d.time[selDay],selDay);
  const cols=hours.map(h=>{
    const isNow=h.t.substring(0,13)===nowStr;
    return `<div class="hcol${isNow?" now":""}">
      <div class="htime">${String(h.hour).padStart(2,"0")}:00</div>
      <div class="hico2">${(h.hour<srH||h.hour>=ssH)&&h.wmo===0?"🌙":wi(h.wmo)}</div>
      <div class="htemp2">${Math.round(h.temp)}°</div>
      <div class="hwind">${wDir(h.dir)} ${Math.round(h.wind)}<br><span style="color:var(--t3)">↑${Math.round(h.gusts)}</span></div>
      ${h.precip>0?`<div class="hrain">${h.precip.toFixed(1)}mm</div>`:""}
      ${h.prob>0?`<div class="hprob">${h.prob}%</div>`:""}
    </div>`;
  }).join("");
  return lbl+`<div style="font-size:.72rem;color:var(--o);font-weight:700;margin-bottom:.6rem;text-transform:uppercase;letter-spacing:1.5px">${dayLabel}</div>
    <div class="hscroll"><div class="htable">${cols}</div></div>
    <div class="hfoot">🌅 ${fmtT(d.sunrise[selDay])} · 🌇 ${fmtT(d.sunset[selDay])} · vento km/h · ↑raffiche</div>`;
}

function changeDay(i){
  selDay=i;
  document.querySelectorAll(".fcd").forEach((el,idx)=>el.classList.toggle("act",idx===i));
  const hc=document.getElementById("hcard");
  if(hc){hc.innerHTML=renderHourly();hc.scrollIntoView({behavior:"smooth",block:"nearest"});}
}

function renderFavToggle(){
  const wrap=document.getElementById("fav-wrap"); if(!wrap)return;
  const isFav=CUR&&S.isF(CUR.name);
  wrap.innerHTML=`<div class="fav-wrap">
    <button id="fav-btn" class="fav-btn${isFav?" saved":""}" onclick="toggleFav()">
      ${isFav?"★ Preferito":"☆ Salva nei preferiti"}
    </button>
  </div>`;
}

function loader(msg){document.getElementById("content").innerHTML=`<div class="ldiv"><div class="spin"></div><div class="ltxt">${msg}</div></div>`;}
function showErr(msg){document.getElementById("content").innerHTML=`<div class="errbox">⚠️ ${msg}</div>`;}

let dP=null;

document.getElementById("ibtn").addEventListener("click",async()=>{if(dP){dP.prompt();await dP.userChoice;dP=null;}document.getElementById("banner").classList.remove("visible");});

if("serviceWorker" in navigator){
  window.addEventListener("load",()=>{
    const sw=`const C="osm-v5";
self.addEventListener("install",e=>e.waitUntil(caches.open(C).then(c=>c.addAll(["/"]))));
self.addEventListener("activate",e=>e.waitUntil(caches.keys().then(k=>Promise.all(k.filter(x=>x!==C).map(x=>caches.delete(x))))));
self.addEventListener("fetch",e=>{
  if(e.request.url.includes("open-meteo.com")||e.request.url.includes("fonts.gstatic")){
    e.respondWith(fetch(e.request).catch(()=>caches.match(e.request)));return;
  }
  e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request)));
});`;
    const blob=new Blob([sw],{type:"application/javascript"});
    navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
  });
}
